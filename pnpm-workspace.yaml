packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11: 빌드 스크립트가 있는 패키지는 명시적으로 승인해야 설치가 통과합니다.
# (설치 시 ERR_PNPM_IGNORED_BUILDS가 나면 해당 패키지를 여기에 추가)
allowBuilds:
  esbuild: true
  '@electric-sql/pglite': true
  '@nestjs/core': true
  '@swc/core': true
  unrs-resolver: true
  '@scarf/scarf': false
  # firebase 웹 SDK(Auth)는 번들에서 이 빌드 스크립트가 필요 없다.
  # @firebase/util 의 postinstall 은 Scarf 분석 no-op, protobufjs 는 우리가 쓰지 않는
  # 모듈(Firestore 등)용 코드 생성이라 명시적으로 거절한다.
  '@firebase/util': false
  protobufjs: false
