packages:
  - "apps/*"
  - "packages/*"

# pnpm 11: 빌드 스크립트가 있는 패키지는 명시적으로 승인해야 설치가 통과합니다.
onlyBuiltDependencies:
  - esbuild
  - unrs-resolver
  - "@swc/core"
  - "@sentry/cli"
  - protobufjs
allowBuilds:
  esbuild: true
  unrs-resolver: true
  "@swc/core": true
  "@scarf/scarf": false
  '@sentry/cli': true
  # firebase(통합 회원 로그인) 의존성. 이메일/익명 인증엔 빌드 스크립트가 불필요
  # (선택적 native/proto 최적화)하므로 빌드하지 않음 — 설치 통과 + 런타임 정상.
  protobufjs: false
  '@firebase/util': false
minimumReleaseAgeExclude:
  - '@heejun/deskcloud@0.1.0'

overrides:
  handlebars: '>=4.7.9'
  multer: '>=2.2.0'
  undici: '^7.28.0'
  ws: '>=8.21.0'
  form-data: '>=4.0.6'
  hono: '>=4.12.25'
  find-my-way: '>=8.2.2'
  '@fastify/middie': '>=9.3.2'
  fastify: '>=5.7.2'
  fast-uri: '>=3.1.2'
  path-to-regexp: '>=6.3.0'
  serialize-javascript: '>=7.0.3'
  piscina: '>=4.9.3'
  drizzle-orm: '>=0.45.2'
  vitest: '>=4.1.9'
  '@vitest/coverage-v8': '>=4.1.9'
  '@vitest/ui': '>=4.1.9'
  vite: '>=8.0.16'
  jspdf: '>=4.2.1'

auditConfig:
  ignoreGhsas:
    - GHSA-2p57-rm9w-gvfp
