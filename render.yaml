# TermsDesk SaaS(멀티테넌트) 배포 — Render Blueprint.
# API(Docker) + Web(정적) + 관리형 Postgres. 토큰/시크릿 없으면 대시보드에서 채웁니다.
services:
  - type: web
    name: termsdesk-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health/ready
    envVars:
      - key: TERMSDESK_MODE
        value: saas
      - key: DATABASE_URL
        fromDatabase:
          name: termsdesk-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: 'true'
      - key: WEB_ORIGIN
        sync: false # 웹 정적 사이트 URL 로 설정

  - type: web
    name: termsdesk-web
    runtime: static
    buildCommand: >-
      corepack enable && pnpm install --frozen-lockfile && pnpm --filter
      @termsdesk/shared build && pnpm --filter @termsdesk/sdk build && pnpm
      --filter @termsdesk/web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # termsdesk-api URL 로 설정
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: termsdesk-db
    plan: free
