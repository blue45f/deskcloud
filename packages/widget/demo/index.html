<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReviewDesk 위젯 데모</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #1a1d23;
        background: #f7f8fa;
      }
      .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
      h1 { font-size: 24px; margin: 0 0 4px; }
      .lede { color: #6b7280; margin: 0 0 28px; font-size: 14px; }
      .controls {
        display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
        padding: 16px; border: 1px solid #d7dae0; border-radius: 12px;
        background: #fff; margin-bottom: 32px;
      }
      .controls label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #4a4f57; }
      .controls input { padding: 8px 10px; border: 1px solid #d7dae0; border-radius: 8px; font: inherit; font-size: 13px; }
      section.demo { margin: 0 0 40px; }
      section.demo > h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; margin: 0 0 12px; }
      .inline-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>ReviewDesk 위젯 데모</h1>
      <p class="lede">로컬 API(<code id="ep-label"></code>)에 붙어 데모 테넌트(pk_demo)의 리뷰를 표시/수집합니다.</p>

      <div class="controls">
        <label>publishableKey<input id="pk" value="pk_demo" /></label>
        <label>endpoint<input id="endpoint" value="http://localhost:4099" /></label>
        <label>subjectId<input id="subjectId" value="pro-plan" /></label>
        <label>accent<input id="accent" value="#2f5fe0" type="color" /></label>
      </div>

      <div id="app"></div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
