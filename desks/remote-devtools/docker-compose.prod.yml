# ──────────────────────────────────────────────────────────────────────
# Production docker-compose for self-hosting Remote DevTools.
#
# Bring up:   docker compose -f docker-compose.prod.yml up -d
# Tear down:  docker compose -f docker-compose.prod.yml down
# Logs:       docker compose -f docker-compose.prod.yml logs -f
#
# The stack exposes a single port (80/443) via nginx, which routes
# to the internal API, external API, and serves the client SPA.
# ──────────────────────────────────────────────────────────────────────
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-remote_devtools}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-remote_devtools}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-remote_devtools}']
      interval: 10s
      timeout: 5s
      retries: 5

  internal:
    build:
      context: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - PORT=3000
      - DB_WRITER_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-remote_devtools}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-remote_devtools}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - INTERNAL_HOST=${INTERNAL_HOST:-http://internal:3000}
      - EXTERNAL_HOST=${EXTERNAL_HOST:-http://external:3001}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: node dist/apps/remote-platform-internal/main.js
    networks:
      - internal

  external:
    build:
      context: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - PORT=3001
      - DB_WRITER_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-remote_devtools}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-remote_devtools}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - INTERNAL_HOST=${INTERNAL_HOST:-http://internal:3000}
      - EXTERNAL_HOST=${EXTERNAL_HOST:-http://external:3001}
      - JIRA_HOST_URL=${JIRA_HOST_URL:-}
      - JIRA_API_EMAIL=${JIRA_API_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: node dist/apps/remote-platform-external/main.js
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - internal
      - external
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    driver: local
