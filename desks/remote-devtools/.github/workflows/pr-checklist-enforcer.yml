name: PR checklist enforcer

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: pr-checklist-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enforce-pr-checklist:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR checklist completion
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = "<!-- ci-pass-gate-checklist-enforcer -->";
            const ciRunQueryUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions?query=workflow%3ACI+${pr.head.sha}`;

            function normalizeChecklistText(value) {
              return value
                .replace(/`/g, "")
                .replace(/\s+/g, " ")
                .trim();
            }

            const requiredItems = [
              "CI pass gate가 성공했는지 확인 (`CI` 체크 목록에서 필수)",
              "CI pass gate 집계에서 아래 항목이 모두 success인지 확인",
              "backend-lint-and-typecheck",
              "backend-test",
              "client-typecheck",
              "client-test",
              "sdk-check",
              "figma-plugin-check",
              "build",
              "skipped 항목이 하나라도 있으면 PR 병합 대기",
              "push 반영 시 ci-pass-gate-push-summary 코멘트(성공/실패)를 확인",
            ];

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              }
            );

            const existingComment = comments.find((comment) =>
              (comment.body || "").includes(marker)
            );

            const body = pr.body || "";
            // Extract the body of the "## 검증 체크리스트" section by
            // splitting on H2 headings. The previous regex used `\s*$`
            // inside a non-greedy lookahead, which the m-flagged engine
            // satisfied at the end of the very first line — leaving the
            // section as a one-line slice. Splitting on `^##\s+` and
            // picking the section whose body starts with the heading
            // text is both readable and robust to trailing-blank-line
            // tomfoolery.
            const sections = body.split(/^##\s+/m);
            const checklistSection =
              sections.find((s) => /^검증 체크리스트(?:\s|$)/.test(s.trim())) || "";
            const isChecklistMissing = checklistSection === "";

            const checkedItems = new Set(
              (checklistSection.match(/^\s*-\s*\[[xX]\]\s*([^\n]+)/gm) || [])
                .map((line) =>
                  normalizeChecklistText(line.replace(/^\s*-\s*\[[xX]\]\s*/, ""))
                )
            );

            const missing = requiredItems.filter((item) => {
              if (isChecklistMissing) {
                return true;
              }
              const normalizedItem = normalizeChecklistText(item);

              return [...checkedItems].every(
                (checked) => !checked.includes(normalizedItem)
              );
            });

            if (missing.length === 0) {
              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                });
              }
              return;
            }

            const missingLines = missing
              .map((item) => `- ${item}`)
              .join("\n");
            const missingReason = isChecklistMissing
              ? "PR 본문에 `## 검증 체크리스트` 섹션이 없습니다."
              : "아래 항목이 체크되지 않았습니다.";
            const commentBody = [
              `${marker}`,
              "### ⚠️ PR 체크리스트 확인 필요",
              "",
              "병합 전 PR 체크리스트를 먼저 정비해 주세요.",
              "",
              `사유: ${missingReason}`,
              "",
              `${missingLines}`,
              "",
              "권장:",
              "- 해당 항목을 체크한 뒤, CI pass gate 결과가 `success`이고 `skipped`가 없는지 확인 후 다시 동기화해 주세요.",
              "- 원격 푸시 전에는 PR 체크리스트/`ci-pass-gate-pr-summary`, 푸시 후에는 commit 주석의 `ci-pass-gate-push-summary`를 함께 확인하세요.",
              `- 현재 PR HEAD 커밋 기준 CI 실행 목록: ${ciRunQueryUrl}`,
            ].join("\n");

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: commentBody,
              });
            }

            core.setFailed(
              `PR checklist missing ${missing.length} checked item(s): ${missing.join(", ")}`
            );
