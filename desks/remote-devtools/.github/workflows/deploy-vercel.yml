name: Deploy demo to Vercel

# Deploy on-demand or automatically after a successful CI run on main.
# When run by `workflow_run`, this workflow is executed only after CI completes.
#
# Optional GitHub secrets (set under Settings → Environments → production):
#   VERCEL_TOKEN       — https://vercel.com/account/tokens (full account scope)
#   VERCEL_ORG_ID      — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  — same file
#   Without these secrets the deploy steps are skipped gracefully (job succeeds).
on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main

concurrency:
  group: vercel-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      deployments: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Skip deployment when Vercel secrets are not configured
        if: env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == ''
        run: echo "::notice::Vercel secrets (VERCEL_TOKEN/ORG_ID/PROJECT_ID) not configured; skipping deploy."

      - uses: actions/checkout@v6
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v6
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''

      - uses: actions/setup-node@v6
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        with:
          node-version: 24
          cache: pnpm

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: pnpm add -g vercel@latest

      - name: Pull Vercel project metadata
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy
        id: deploy
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          echo "## 🚀 Production deploy ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "Public URL: https://remote-devtools.vercel.app/" >> $GITHUB_STEP_SUMMARY
