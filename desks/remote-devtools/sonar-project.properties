# Run with SONAR_HOST_URL and SONAR_TOKEN supplied by your shell or CI secrets.
sonar.projectName=remote-debug-tools
sonar.projectKey=remote-debug-tools
sonar.projectBaseDir=.
sonar.sourceEncoding=UTF-8
sonar.sources=client,apps,sdk,libs,figma-plugin
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.next/**,**/.vercel/**,**/.turbo/**,**/.cache/**,**/storybook-static/**,**/pnpm-lock.yaml,**/package-lock.json,**/yarn.lock,**/bun.lockb,**/*.min.js,**/*.generated.*,**/generated/**,**/public/**/*.png,**/public/**/*.jpg,**/public/**/*.jpeg,**/public/**/*.webp,**/public/**/*.avif,**/public/**/*.ico,**/public/**/*.svg,devtools-frontend/**
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/test/**,**/tests/**,**/*.config.*,**/scripts/**,**/docs/**,**/public/**,devtools-frontend/**
sonar.cpd.exclusions=**/*.test.*,**/*.spec.*,devtools-frontend/**
sonar.typescript.tsconfigPaths=tsconfig.json,client/tsconfig.json,figma-plugin/tsconfig.json,sdk/tsconfig.json
sonar.verbose=false
sonar.qualitygate.wait=true

sonar.javascript.node.maxspace=4096
