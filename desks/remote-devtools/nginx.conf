# ──────────────────────────────────────────────────────────────────────
# Unified reverse proxy for the Remote DevTools production stack.
#
# Routes:
#   /api/*            → internal (port 3000)
#   /ws/presence      → internal (WebSocket)
#   /devtools/*       → internal (Chrome DevTools frontend)
#   /sdk/*            → external (port 3001)
#   /buffer/*         → external (SDK beacon endpoint)
#   /socket.io/*      → external (WebSocket gateway)
#   /*                → client SPA (port 8080 or static files)
# ──────────────────────────────────────────────────────────────────────

upstream internal {
    server internal:3000;
}

upstream external {
    server external:3001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 30M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    server_tokens off;

    # ── Internal API ──
    location /api/ {
        proxy_pass http://internal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
 
    # ── Sessions API ──
    location /sessions {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://internal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Internal WebSocket (presence) ──
    location /ws/presence {
        proxy_pass http://internal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Internal WebSocket (playback) ──
    location /ws/playback {
        proxy_pass http://internal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── DevTools frontend (served by internal) ──
    location /devtools/ {
        proxy_pass http://internal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tabbed-debug/ {
        proxy_pass http://internal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── External SDK ──
    location /sdk/ {
        proxy_pass http://external;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── External beacon endpoint ──
    location /buffer/ {
        proxy_pass http://external;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── External WebSocket gateway ──
    # Prefix without a trailing slash: the SDK connects to `/socket.io` (no
    # trailing slash) because NestJS WsAdapter matches the exact pathname against
    # normalizePath('/socket.io') = '/socket.io'. `proxy_pass http://external`
    # (no URI) forwards the original `/socket.io` path unchanged to the gateway.
    location /socket.io {
        proxy_pass http://external;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Client SPA (catch-all) ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache busting for hashed assets
        location ~* ^/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
