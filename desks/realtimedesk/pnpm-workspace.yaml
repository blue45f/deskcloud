packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11: 빌드 스크립트가 있는 패키지는 명시적으로 승인해야 설치가 통과합니다.
# (설치 시 ERR_PNPM_IGNORED_BUILDS가 나면 해당 패키지를 여기에 추가)
allowBuilds:
  esbuild: true
  '@electric-sql/pglite': true
  '@nestjs/core': true
  '@swc/core': true
  unrs-resolver: true
  '@scarf/scarf': false
  # firebase 웹 SDK 전이 의존성 — 빌드 스크립트 불필요(런타임 영향 없음). 무시 빌드 경고 차단.
  '@firebase/util': false
  protobufjs: false

auditConfig:
  ignoreGhsas:
    - GHSA-2p57-rm9w-gvfp

overrides:
  handlebars: '>=4.7.9'
  multer: '>=2.2.0'
  undici: '^7.28.0'
  ws: '>=8.21.0'
  form-data: '>=4.0.6'
  hono: '>=4.12.25'
  find-my-way: '>=8.2.2'
  '@fastify/middie': '>=9.3.2'
  fastify: '>=5.7.2'
  fast-uri: '>=3.1.2'
  path-to-regexp: '>=6.3.0'
  serialize-javascript: '>=7.0.3'
  piscina: '>=4.9.3'
  drizzle-orm: '>=0.45.2'
  vitest: '>=4.1.9'
  '@vitest/coverage-v8': '>=4.1.9'
  '@vitest/ui': '>=4.1.9'
  vite: '>=8.0.16'
  jspdf: '>=4.2.1'
