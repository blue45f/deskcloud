<!doctype html>
<html lang="ko" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#16140f" />

    <!-- PWA(apple) — manifest 링크와 SW 등록은 vite-plugin-pwa 가 자동 주입한다. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ReviewDesk" />
    <meta
      name="description"
      content="ReviewDesk — 멀티테넌트 평점·리뷰·후기(testimonials) 수집 SaaS. 외부 서비스가 셀프가입해 publishable 키로 리뷰를 받고 노출하고, 운영자는 secret 키로 검수·집계한다."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ReviewDesk" />
    <meta property="og:title" content="ReviewDesk — 임베드 평점·리뷰·후기 수집" />
    <meta
      property="og:description"
      content="셀프가입 → 임베드 한 줄 → 별점·리뷰·후기를 받고 검수하고 노출합니다. 멀티테넌트 SaaS·셀프호스팅."
    />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReviewDesk — 임베드 평점·리뷰·후기 수집" />
    <meta
      name="twitter:description"
      content="셀프가입 → 임베드 한 줄 → 별점·리뷰·후기를 받고 검수하고 노출합니다."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <!--
      Pretendard 가변 폰트 — Subresource Integrity 로 무결성 검증(잠재적 CDN 변조 차단).
      jsDelivr 의 .min.css 는 clean-css 로 동적 생성돼 해시가 바뀔 수 있으므로(SRI 부적합),
      불변 태그(@v1.3.9)에서 그대로 서빙되는 원본 .css 를 고정 sha384 해시로 검증한다.
    -->
    <link
      rel="stylesheet"
      crossorigin="anonymous"
      integrity="sha384-5BlC3z5PiUASCwi5iNqbsXbtE1SBi8nn1Upz4JWJg2upbZKNNDXLRPKEcn79qArn"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"
    />
    <title>ReviewDesk — 임베드 평점·리뷰·후기 수집</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
