    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <!--
      Pretendard 웹폰트 — 버전 태그로 고정한 *원본*(비-min) 파일을 SRI 로 무결성 검증한다.
      jsDelivr 의 .min.css 는 clean-css 로 동적 재생성되어 해시가 불안정하므로(파일 헤더가
      "Do NOT use SRI with dynamically generated files" 라고 경고) SRI 대상으로 부적합하다.
      원본 파일은 git 태그에서 그대로 서빙되어 변하지 않으므로 integrity 가 안전하다.
    -->
    <link
      rel="stylesheet"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      integrity="sha384-5BlC3z5PiUASCwi5iNqbsXbtE1SBi8nn1Upz4JWJg2upbZKNNDXLRPKEcn79qArn"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable.css"
    />
