name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '**/*.txt', 'LICENSE', '.gitignore', '.editorconfig']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '**/*.txt', 'LICENSE', '.gitignore', '.editorconfig']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: termsdesk
          POSTGRES_PASSWORD: termsdesk
          POSTGRES_DB: termsdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U termsdesk -d termsdesk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # 단위 테스트는 DB가 필요 없지만, 통합 테스트 도입 대비로 DB 서비스를 띄워 둔다.
      DATABASE_URL: postgres://termsdesk:termsdesk@localhost:5432/termsdesk
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6 # 버전은 package.json packageManager 단일 소스
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify # format:check → lint → typecheck → test → build
